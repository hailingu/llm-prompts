# ============================================================
# ppt-brand-style-system / component_semantic_mappings.yml
# Semantic role -> component-ready payload fragments
# ============================================================

meta:
  purpose: Resolve component-library semantic payload roles into style-profile-compatible class payloads.
  consumers:
    - ppt-component-library/assets/examples.yml
    - agents/ppt-specialist.agent.md
    - agents/ppt-specialist.agent.md
  resolution_order:
    - Read the component semantic_payload roles.
    - Select the target style profile.
    - Merge neutral tokens first, then role-specific tokens.
    - Let page-level exceptions override this file only when the reading task explicitly requires it.

role_families:
  emphasis_roles: [primary, info, positive, warning, critical, neutral]
  surface_roles: [subtle, elevated, strong_surface]
  text_roles: [primary_text, secondary_text, muted_text]
  structure_roles: [neutral_structure]

semantic_field_contracts:
  emphasis_role: emphasis_roles
  trend_role: emphasis_roles
  active_step_role: emphasis_roles
  inactive_step_role: emphasis_roles
  badge_role: emphasis_roles
  node_role: emphasis_roles
  flow_role: emphasis_roles
  core_role: emphasis_roles
  ring_role: emphasis_roles
  surface_role: surface_roles
  text_role: text_roles
  secondary_text_role: text_roles
  value_role: text_roles
  label_role: text_roles
  body_role: text_roles
  icon_role: text_roles
  structure_role: structure_roles
  timeline_role: structure_roles
  border_role:
    maps_to: structure_role
    status: compatibility_alias

component_families:
  Card_Glass:
    slot_set: card_glass
    semantic_fields: [surface_role, text_role, secondary_text_role, structure_role]
    resolution_sequence: [surface_role, structure_role, text_role, secondary_text_role]
  Card_Accent:
    slot_set: card_accent
    semantic_fields: [emphasis_role, surface_role, text_role, secondary_text_role]
    resolution_sequence: [surface_role, emphasis_role, text_role, secondary_text_role]
  Card_Solid:
    slot_set: card_solid
    semantic_fields: [surface_role, emphasis_role, text_role, secondary_text_role]
    resolution_sequence: [surface_role, emphasis_role, text_role, secondary_text_role]
  Metric_Big:
    slot_set: metric_big
    semantic_fields: [emphasis_role, value_role]
    resolution_sequence: [value_role, emphasis_role]
  Metric_Trend:
    slot_set: metric_trend
    semantic_fields: [trend_role, value_role, label_role]
    resolution_sequence: [value_role, label_role, trend_role]
  Metric_KpiRow:
    slot_set: kpi_row
    semantic_fields: [surface_role, structure_role, value_role, label_role]
    resolution_sequence: [surface_role, structure_role, value_role, label_role]
  List_Icon:
    slot_set: icon_list
    semantic_fields: [emphasis_role, text_role]
    resolution_sequence: [text_role, emphasis_role]
  List_Timeline:
    slot_set: timeline
    semantic_fields: [timeline_role, active_step_role, inactive_step_role, label_role, body_role]
    resolution_sequence: [timeline_role, label_role, body_role, active_step_role, inactive_step_role]
  Badge_Pill:
    slot_set: badge
    semantic_fields: [badge_role, surface_role]
    resolution_sequence: [surface_role, badge_role]
  Badge_Tag:
    slot_set: tag
    semantic_fields: [surface_role, text_role]
    resolution_sequence: [surface_role, text_role]
  Visual_Arrow:
    slot_set: visual_arrow
    semantic_fields: [text_role]
    resolution_sequence: [text_role]
  Visual_Glow:
    slot_set: visual_glow
    semantic_fields: [emphasis_role]
    resolution_sequence: [emphasis_role]
  Map_Grid:
    slot_set: map_grid
    semantic_fields: [surface_role, structure_role, emphasis_role]
    resolution_sequence: [surface_role, structure_role, emphasis_role]
  Map_NodeNetwork:
    slot_set: node_network
    semantic_fields: [surface_role, node_role, label_role]
    resolution_sequence: [surface_role, label_role, node_role]
  Map_FlowArrow:
    slot_set: flow_arrow
    semantic_fields: [flow_role]
    resolution_sequence: [flow_role]
  Map_RadarRing:
    slot_set: radar_ring
    semantic_fields: [core_role, icon_role, ring_role]
    resolution_sequence: [icon_role, core_role, ring_role]

slot_sets:
  card_glass:
    - surface_class
    - border_class
    - title_text_class
    - body_text_class
  card_accent:
    - surface_class
    - accent_border_class
    - accent_text_class
    - title_text_class
    - body_text_class
  card_solid:
    - surface_class
    - border_class
    - icon_bg_class
    - icon_text_class
    - title_text_class
    - body_text_class
  metric_big:
    - value_text_class
    - accent_text_class
  metric_trend:
    - value_text_class
    - trend_text_class
    - label_class
  kpi_row:
    - row_surface_class
    - row_border_class
    - value_text_class
    - label_text_class
    - divider_class
  icon_list:
    - accent_icon_class
    - item_text_class
  timeline:
    - timeline_border_class
    - marker_ring_class
    - step_1_marker_class
    - step_1_label_class
    - step_1_body_class
    - step_2_marker_class
    - step_2_label_class
    - step_2_body_class
  badge:
    - badge_bg_class
    - badge_text_class
    - badge_border_class
  tag:
    - tag_surface_class
    - tag_text_class
  visual_arrow:
    - arrow_text_class
  visual_glow:
    - glow_bg_class
  flow_arrow:
    - flow_color
  map_grid:
    - grid_surface_class
    - grid_border_class
    - cell_bg_class
    - cell_border_class
    - cell_text_class
  node_network:
    - network_surface_class
    - network_border_class
    - node_dot_class
    - node_border_class
    - node_label_text_class
    - node_label_surface_class
  radar_ring:
    - core_bg_class
    - core_border_class
    - icon_text_class
    - ring_outer_class
    - ring_fill_class
    - ring_inner_class

