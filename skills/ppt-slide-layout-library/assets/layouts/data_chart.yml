# 数据图表布局 (data_chart) — 最常用布局
# 文件: layouts/data_chart.yml

layout:
  id: data_chart
  name: 数据图表布局
  version: 2.0
  category: chart  # 图表分析类

# ── 选择条件 ─────────────────────────────────────────
selection_criteria:
  when_to_use:
    - "单一主题的深度数据分析"
    - "需要图表 + 文字解读配合展示"
    - "数据维度 2-3 个"
    - "洞察点 2-3 个"
  when_not_to_use:
    - "需要多图表对比 → 改用 side_by_side"
    - "需要 4+ 个独立指标 → 改用 dashboard_grid"
    - "纯文字叙事 → 改用 full_width"
  data_requirements:
    chart_data_points: { min: 3, max: 15, optimal: "6-10" }
    insight_cards: { min: 2, max: 3, optimal: 3 }

layout_contract:
  required_thinking_fields: [layout_key, primary_encoding, chart_family, contract_fields, null_policy, contract_source, fallback_plan]
  narrative_fit: [single_insight, chart_led_deep_dive, evidence_plus_interpretation]
  compatible_chart_families: [line_trend, bar_comparison, bubble_relationship]
  compatible_component_families: [Card_Accent, Card_Glass, Metric_Big, Metric_Trend]
  compatible_map_archetypes: []
  fallback_layouts: [chart_synthesis, hybrid, full_width]
  overflow_recovery_order:
    - reduce_right_card_count
    - shorten_card_copy
    - reduce_chart_annotation_density
    - downgrade_to_chart_synthesis_or_full_width

# ── 布局规格 ─────────────────────────────────────────
spec:
  structure_type: "header-main-footer"
  canvas: { width: 1280, height: 720 }
  header: { height_px: 80 }
  footer: { height_px: 40 }
  main:
    available_h_px: 600
    inner_h_px: 552
    padding: "px-12 py-6"
  region_budget_model:
    intent: "图表区与右侧洞察区必须先做净宽净高预算；图表与卡片组件的候选生成必须建立在区域预算之上"
    regions:
      left_chart:
        width_rule: "按 58% 主内容宽度取值"
        height_rule: "main.inner_h_px 扣除图表标题区与容器 padding"
      right_cards:
        width_rule: "按 42% 主内容宽度取值"
        height_rule: "main.inner_h_px 扣除 rail padding、gap 与 footer-safe gap"
  regions:
    left_chart:
      cols: 7
      width_pct: 58
      height_range_px: { min: 180, max: 280, recommended: 220 }
    right_cards:
      cols: 5
      width_pct: 42
      count: { min: 2, max: 3, default: 3 }
      height_distribution: "flex-1 均分"
  component_entrypoints:
    chart_components: [echarts_cartesian_standard, echarts_cartesian_annotated, echarts_bar_compact]
    rail_components: [Card_Accent, Card_Glass, Metric_Big, Metric_Trend, support_micro_card]

# ── 内容规格 ─────────────────────────────────────────
content_spec:
  chart:
    types: ["line", "bar", "pie", "radar", "area"]
    data_points:
      line_chart: { min: 5, max: 12, optimal: 8 }
      bar_chart: { min: 3, max: 8, optimal: 5 }
      pie_chart: { min: 3, max: 6, optimal: 5 }
    title_max_chars: 25
    legend_max_items: 6
  cards:
    per_card:
      title_max_chars: 20
      body_min_chars: 42
      body_max_chars: 120
      bullet_points_max: 4
    balance:
      max_char_diff: 50
    total_content_min_chars: 180
  candidate_selection_rule: "先根据图表区与右侧 rail 的预算，分别生成 chart component 与 insight card 的候选集；右侧 rail 必须在候选集上装箱，左侧 chart 必须按 chart spec 校验 legend/ticks/annotation 密度。"

# ── 约束 ─────────────────────────────────────────────
constraints:
  - "容器规范：必须使用 Flex Column + Space-Between"
  - "Main区域：必须设置 flex-1，内部使用 h-full"
  - "图表优先：左侧图表区宽度必须 ≥ 58%"
  - "右侧对齐：2-3 张洞察卡，flex-1 均分高度"
  - "页脚安全：main_scroll_h <= main_client_h - 8"

worked_layout_example:
  scenario: "Single-theme line chart page with one annotated trend chart on the left and two packed insight cards on the right"
  region_budget:
    left_chart_width_px: 618
    left_chart_height_px: 248
    right_cards_width_px: 446
    right_cards_height_px: 512
  chart_candidates:
    - { component_id: echarts_cartesian_standard, variant: default, estimated_height_px: 236, fit_reason: "适用于低 annotation 密度" }
    - { component_id: echarts_cartesian_annotated, variant: compact, estimated_height_px: 268, fit_reason: "适用于 2-4 个关键 annotation" }
  right_rail_candidates:
    - { component_family: Card_Accent, variant: default, estimated_height_px: 124 }
    - { component_family: Card_Glass, variant: compact, estimated_height_px: 116 }
    - { component_family: Metric_Big, variant: compact, estimated_height_px: 64, semantic_role: support_micro_card }
  packing_result:
    selected_chart_component: { component_id: echarts_cartesian_annotated, variant: compact }
    selected_right_components:
      - { component_family: Card_Accent, variant: default }
      - { component_family: Card_Glass, variant: compact }
      - { component_family: Metric_Big, variant: compact }
    distribution_note:
      - "若右侧三张 compact card 仍有明显剩余空间，优先增大首张主卡留白，而不是简单继续叠第四张卡"

# ── HTML 模板 ─────────────────────────────────────────
template: |
  <div class="slide-container flex flex-col justify-between h-full bg-white">
    <header class="h-[80px] border-b border-slate-200 px-12 pt-6 pb-4 flex items-end justify-between shrink-0">
      <h1 class="text-3xl font-bold text-slate-800">Slide Title</h1>
      <div class="text-sm text-slate-500">Subtitle</div>
    </header>
    
    <main class="flex-1 w-full px-12 py-6 min-h-0 overflow-hidden">
      <div class="grid grid-cols-12 gap-6 h-full w-full">
        <section class="col-span-7 card h-full flex flex-col min-h-0">
          <h3 class="text-lg font-semibold mb-4 shrink-0">Chart Title</h3>
          <div class="flex-1 w-full relative min-h-0">
            <canvas id="mainChart"></canvas>
          </div>
        </section>
        
        <aside class="col-span-5 flex flex-col gap-4 h-full min-h-0">
          <div class="card p-4 flex-1 bg-slate-50 border border-slate-200">
            <h4 class="font-bold text-brand-primary mb-2">Key Insight A</h4>
            <p class="text-sm text-slate-600">Detailed analysis text...</p>
          </div>
          <div class="card p-4 flex-1 bg-slate-50 border border-slate-200">
            <h4 class="font-bold text-brand-secondary mb-2">Key Insight B</h4>
            <p class="text-sm text-slate-600">Secondary observation...</p>
          </div>
        </aside>
      </div>
    </main>
    
    <footer class="h-[40px] px-12 border-t border-slate-200 flex items-center justify-between text-xs text-slate-400 shrink-0">
      <span>Footer Info</span>
      <span>Page #</span>
    </footer>
  </div>
