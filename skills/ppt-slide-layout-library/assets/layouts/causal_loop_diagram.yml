name: causal_loop_diagram
description: "Causal loop diagram layout for system dynamics, feedback loops, and policy intervention analysis. Features a central core loop surrounded by intervention factors with directional influence indicators."
type: layout
version: 1.0.0
selection_criteria:
  - "Use when analyzing feedback loops (positive/negative reinforcement)."
  - "Use for system dynamics or policy impact analysis."
  - "Use to show how external interventions affect a core cycle."
  - "Not suitable for linear temporal processes (use 'process_steps')."
  - "Not suitable for hierarchical structures (use 'tree_map' or 'org_chart')."

spec:
  structure:
    - area: "header"
      height: "80px"
      fixed: true
    - area: "main"
      flex: 1
      layout: "absolute-canvas"
      elements:
        - "core_loop_group (center)"
        - "intervention_satellites (periphery)"
        - "connection_layer (svg background)"
        - "legend_box"
    - area: "footer"
      height: "50px"
      fixed: true

  style_presets:
    core_node: "bg-emerald-800 text-white rounded-full/oval shadow-lg flex items-center justify-center text-center font-bold p-4 z-20"
    intervention_node: "bg-slate-200 text-slate-800 rounded-lg shadow border border-slate-300 p-3 z-20 flex flex-col justify-center"
    polarity_badge: "w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border-2 z-30 absolute"
    polarity_plus: "bg-emerald-100 border-emerald-500 text-emerald-700"
    polarity_minus: "bg-rose-100 border-rose-500 text-rose-700"

content_spec:
  max_core_nodes: 3
  max_interventions: 6
  text_limits:
    node_title: "15-20 chars"
    annotation: "10-30 chars"

layout_contract:
  required_thinking_fields:
    - layout_key
    - core_loop_variables
    - intervention_nodes
    - polarity_map
    - loop_type
    - intervention_message
    - fallback_plan
  narrative_fit:
    - feedback_loop_analysis
    - system_dynamics
    - policy_intervention_map
  compatible_chart_families:
    - network_graph
  compatible_component_families:
    - Badge_Status
    - Card_Accent
    - List_Icon
  compatible_map_archetypes: []
  fallback_layouts:
    - analytical_model_tree
    - system_process_map
    - concept_definition
  overflow_recovery_order:
    - reduce_intervention_count
    - collapse_secondary_annotations
    - simplify_loop_to_single_core_cycle
    - downgrade_to_concept_definition

template: |
  <div class="slide-container flex flex-col h-full bg-white font-sans text-slate-800 relative overflow-hidden">
    <!-- Header -->
    <header class="h-20 px-12 flex items-center justify-between border-b border-slate-200 bg-white z-50">
      <div class="flex flex-col">
        <h1 class="text-3xl font-bold text-emerald-900 tracking-tight">{{title}}</h1>
        <p class="text-sm text-slate-500 mt-1">{{subtitle}}</p>
      </div>
      <div class="flex items-center space-x-4">
          <div class="px-3 py-1 bg-slate-100 rounded text-xs font-semibold text-slate-500">System Analysis</div>
          <img src="assets/logo.png" alt="Logo" class="h-8">
      </div>
    </header>

    <!-- Main Content: System Canvas -->
    <main class="flex-1 relative w-full h-full bg-slate-50 p-8 overflow-hidden">
      
      <!-- Legend (Top Right or Bottom Right) -->
      <div class="absolute bottom-8 right-8 bg-white/90 backdrop-blur p-4 rounded-lg shadow border border-slate-200 z-40 text-xs space-y-2">
        <div class="flex items-center space-x-2">
          <div class="w-20 p-1 bg-emerald-800 text-white text-center rounded text-[10px]">Core State</div>
          <span class="text-slate-600">Primary system variables</span>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-20 p-1 bg-slate-200 text-slate-800 text-center border border-slate-300 rounded text-[10px]">Factor</div>
          <span class="text-slate-600">External intervention</span>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-4 h-4 rounded-full bg-emerald-100 border border-emerald-500 flex items-center justify-center text-[8px]">+</div>
          <span class="text-slate-600">Encourages / Positive</span>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-4 h-4 rounded-full bg-rose-100 border border-rose-500 flex items-center justify-center text-[8px]">-</div>
          <span class="text-slate-600">Discourages / Negative</span>
        </div>
      </div>

      <!-- Diagram Canvas Container -->
      <div class="relative w-full h-full mx-auto max-w-5xl">
        
        <!-- SVG Layer for Connectors -->
        <svg class="absolute inset-0 w-full h-full z-0 pointer-events-none stroke-current text-slate-400" preserveAspectRatio="xMidYMid meet">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
            </marker>
          </defs>
          <!-- Loop connections (Core layout) -->
          <path d="M480,250 Q550,200 620,250" fill="none" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
          <path d="M650,280 Q650,380 580,420" fill="none" stroke-width="2" marker-end="url(#arrowhead)" />
          <path d="M520,420 Q450,380 450,280" fill="none" stroke-width="2" marker-end="url(#arrowhead)" />
          
          <!-- Intervention connections (Examples) -->
          <path d="M250,250 Q350,250 420,250" fill="none" stroke-width="1.5" marker-end="url(#arrowhead)" />
          <path d="M850,250 Q750,250 680,250" fill="none" stroke-width="1.5" marker-end="url(#arrowhead)" />
          <path d="M250,450 Q350,400 450,450" fill="none" stroke-width="1.5" marker-end="url(#arrowhead)" />
        </svg>

        <!-- Core Loop (Central Triangle) -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[400px] h-[300px] z-10">
           <!-- Top Center Node -->
           <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-32 h-32 bg-emerald-800 text-white rounded-full flex items-center justify-center text-center p-4 shadow-xl border-4 border-emerald-600">
             <span class="font-bold text-sm leading-tight">Driver Supply</span>
           </div>
           
           <!-- Bottom Left Node -->
           <div class="absolute bottom-0 left-0 w-32 h-32 bg-emerald-800 text-white rounded-full flex items-center justify-center text-center p-4 shadow-xl border-4 border-emerald-600">
             <span class="font-bold text-sm leading-tight">Dirty Truck Supply</span>
           </div>

           <!-- Bottom Right Node -->
           <div class="absolute bottom-0 right-0 w-32 h-32 bg-emerald-800 text-white rounded-full flex items-center justify-center text-center p-4 shadow-xl border-4 border-emerald-600">
             <span class="font-bold text-sm leading-tight">Clean Truck Supply</span>
           </div>
           
           <!-- Central Triangle Shader (Optional background shape) -->
           <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[40%] w-0 h-0 border-l-[60px] border-l-transparent border-r-[60px] border-r-transparent border-b-[100px] border-b-emerald-100 opacity-50 z-[-1]"></div>
        </div>

        <!-- Intervention Nodes (Satellites) -->
        
        <!-- 1. Top Left -->
        <div class="absolute top-[15%] left-[10%] w-48 bg-slate-200 border border-slate-300 rounded shadow-md p-4">
          <div class="flex items-center mb-2">
            <span class="w-6 h-6 rounded-full bg-emerald-600 text-white flex items-center justify-center text-xs font-bold mr-2">3</span>
            <h3 class="font-bold text-slate-800 text-sm">Safety & Security</h3>
          </div>
          <div class="absolute -right-3 top-1/2 w-6 h-6 rounded-full bg-rose-100 border border-rose-500 flex items-center justify-center text-rose-700 font-bold text-xs shadow-sm z-20">-</div>
        </div>

        <!-- 2. Bottom Left -->
        <div class="absolute bottom-[20%] left-[10%] w-48 bg-slate-200 border border-slate-300 rounded shadow-md p-4">
          <div class="flex items-center mb-2">
            <span class="w-6 h-6 rounded-full bg-emerald-600 text-white flex items-center justify-center text-xs font-bold mr-2">2</span>
            <h3 class="font-bold text-slate-800 text-sm">Truck Ban</h3>
          </div>
          <div class="absolute -right-3 top-1/2 w-6 h-6 rounded-full bg-rose-100 border border-rose-500 flex items-center justify-center text-rose-700 font-bold text-xs shadow-sm z-20">-</div>
        </div>

        <!-- 3. Top Right -->
        <div class="absolute top-[15%] right-[10%] w-48 bg-slate-200 border border-slate-300 rounded shadow-md p-4">
          <div class="flex items-center mb-2">
             <span class="w-6 h-6 rounded-full bg-emerald-600 text-white flex items-center justify-center text-xs font-bold mr-2">4</span>
             <h3 class="font-bold text-slate-800 text-sm">Concession</h3>
          </div>
          <div class="absolute -left-3 top-1/2 w-6 h-6 rounded-full bg-rose-100 border border-rose-500 flex items-center justify-center text-rose-700 font-bold text-xs shadow-sm z-20">-</div>
        </div>

        <!-- 4. Bottom Right -->
        <div class="absolute bottom-[25%] right-[10%] w-52 bg-slate-200 border border-slate-300 rounded shadow-md p-4">
          <div class="flex items-center mb-2">
             <span class="w-6 h-6 rounded-full bg-emerald-600 text-white flex items-center justify-center text-xs font-bold mr-2">1</span>
             <h3 class="font-bold text-slate-800 text-sm">Environmental Cargo Fee</h3>
          </div>
           <div class="absolute -left-3 top-1/2 w-6 h-6 rounded-full bg-emerald-100 border border-emerald-500 flex items-center justify-center text-emerald-700 font-bold text-xs shadow-sm z-20">+</div>
        </div>

        <!-- 5. Bottom Center -->
        <div class="absolute bottom-[10%] left-1/2 transform -translate-x-1/2 w-56 bg-slate-200 border border-slate-300 rounded shadow-md p-4">
          <div class="flex items-center mb-2">
             <span class="w-6 h-6 rounded-full bg-emerald-600 text-white flex items-center justify-center text-xs font-bold mr-2">5</span>
             <h3 class="font-bold text-slate-800 text-sm">Truck financing program</h3>
          </div>
           <div class="absolute -top-3 left-1/2 w-6 h-6 rounded-full bg-emerald-100 border border-emerald-500 flex items-center justify-center text-emerald-700 font-bold text-xs shadow-sm z-20">+</div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="h-[50px] bg-white border-t border-slate-200 px-12 flex items-center justify-between text-xs text-slate-400 z-50">
      <span>Source: BCG Analysis; Moffet and Nichols Data</span>
      <div class="flex items-center space-x-4">
        <span>The Boston Consulting Group</span>
        <span>Page 32</span>
      </div>
    </footer>
  </div>
