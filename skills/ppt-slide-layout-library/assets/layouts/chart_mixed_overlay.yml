# 混合图表+悬浮洞察布局 (chart_mixed_overlay)
# 文件: layouts/chart_mixed_overlay.yml

layout:
  id: chart_mixed_overlay
  name: 混合图表+悬浮洞察
  version: 2.6
  category: chart

selection_criteria:
  when_to_use:
    - "分析时间序列数据的波动性 (Fluctuations/Seasonality)"
    - "混合数据类型展示 (柱状图 + 折线图)"
    - "需要直接在图表上标注关键现象 (Callouts)"
    - "强调峰值、谷值或均值差距"
  when_not_to_use:
    - "简单的数据对比 (改用 data_chart)"
    - "无特定波动现象的平稳数据"
    - "单一数据系列 (除非有很强的外部事件标注)"

spec:
  regions:
    canvas:
      layout: "full_width_chart"
      overlay: "floating_callout"

content_spec:
  chart:
    type: "mixed (bar + line)"
    series_limit: { recommended: 6 } # 多年度对比
  callout:
    max_words: 30
    style: "rounded_shadow_box"

constraints:
  - "必须包含均值线或趋势线作为参考"
  - "悬浮框必须指向具体的数据特征点"
  - "图例置于底部"

# ── HTML 模板 ─────────────────────────────────────────
template: |
  <div class="slide-container flex flex-col justify-between h-full bg-white text-slate-800">
    <!-- Header -->
    <header class="h-[80px] border-b-2 border-brand-primary px-12 pt-6 pb-2 shrink-0">
      <h1 class="text-3xl font-bold text-brand-primary tracking-tight">港口货运需求波动剧烈...</h1>
      <p class="text-sm text-slate-500 mt-1">圣佩德罗湾港口 TEU 需求的季节性特征分析</p>
    </header>
    
    <!-- Main Content -->
    <main class="flex-1 w-full px-12 py-4 flex flex-col min-h-0 relative">
      
      <!-- Chart Canvas -->
      <div class="flex-1 w-full relative">
         <!-- ECharts Container -->
         <div id="mainChart" class="w-full h-full"></div>
         
         <!-- Floating Callout Box (Example Position) -->
         <div class="absolute top-[45%] right-[25%] bg-slate-100/90 backdrop-blur-sm border border-slate-300 p-4 rounded-lg shadow-lg z-10 w-64">
            <h4 class="font-bold text-sm mb-2 underline decoration-brand-primary decoration-2">峰谷波动特征:</h4>
            <ul class="text-xs space-y-1 list-disc pl-4 text-slate-700">
              <li><span class="font-semibold">~27%</span> 季节性平均波动</li>
              <li><span class="font-semibold">~38%</span> 2004年最大振幅</li>
              <li><span class="font-semibold">~36%</span> 2006年持续高位</li>
            </ul>
            <!-- Connecting Lines (Visual CSS borders) -->
            <div class="absolute -left-12 top-1/2 w-12 h-[1px] bg-slate-400"></div>
            <div class="absolute -left-16 bottom-0 w-16 h-[1px] bg-slate-400 rotate-12 origin-right"></div>
         </div>
         
         <!-- Specific Data Annotation (Example: Outlier) -->
         <div class="absolute bottom-[25%] right-[15%] text-xs text-slate-500 w-32">
            <div class="mb-1">PMA lock-out <br/> of ILWU</div>
            <div class="w-[1px] h-8 bg-slate-400 mx-auto"></div>
             <!-- Arrowhead down -->
            <div class="w-0 h-0 border-l-[4px] border-r-[4px] border-t-[6px] border-l-transparent border-r-transparent border-t-slate-400 mx-auto"></div>
         </div>

      </div>

    </main>
    
    <!-- Bottom Legend Area (Simulated if not in chart) -->
    <div class="h-[40px] px-12 flex justify-center items-center space-x-6 text-xs text-slate-600 shrink-0">
       <span class="flex items-center"><span class="w-3 h-3 bg-slate-400 mr-1"></span> 2000</span>
       <span class="flex items-center"><span class="w-3 h-3 bg-slate-300 mr-1"></span> 2001</span>
       <span class="flex items-center"><span class="w-3 h-3 bg-brand-secondary mr-1"></span> 2002</span>
       <span class="flex items-center"><span class="w-8 h-0.5 bg-slate-800 mr-1"></span> Mean</span>
    </div>
    
    <footer class="h-[40px] px-12 border-t border-slate-200 shrink-0 flex justify-between items-center text-xs text-slate-400">
      <span class="italic">Source: Tioga Group and Global Insight, San Pedro Bay Cargo Forecast Decemeber, 2007.</span>
      <span>18</span>
    </footer>
  </div>
