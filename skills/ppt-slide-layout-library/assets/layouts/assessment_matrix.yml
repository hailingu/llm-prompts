        </div>
        
        <div class="flex items-center justify-center py-2 border-l-2 border-dashed border-slate-300">
           <svg class="w-8 h-8 text-slate-600" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-16v16c4.42 0 8-3.58 8-8s-3.58-8-8-8z"/></svg>
        </div>
        <div class="flex items-center justify-center py-2">
            <svg class="w-8 h-8 text-brand-primary" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
        </div>
        
        <div class="flex items-center justify-center py-2 border-l-2 border-dashed border-slate-300 bg-brand-primary/5">
           <svg class="w-8 h-8 text-slate-600" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="flex items-center justify-center py-2 bg-brand-primary/5">
           <svg class="w-8 h-8 text-brand-primary" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-16v8h8c0 4.42-3.58 8-8 8V4z"/></svg>
        </div>

      </div>
      
      <!-- Legend -->
      <div class="w-full max-w-5xl mt-4 flex items-center justify-end space-x-4 text-xs text-slate-500">
         <span>Worse</span>
         <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
         <div class="h-[1px] w-12 bg-slate-400"></div>
         <svg class="w-5 h-5 text-slate-800" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
         <span>Better</span>
      </div>

    </main>
    
    <footer class="h-[40px] px-12 border-t border-slate-200 shrink-0"></footer>
  </div>
